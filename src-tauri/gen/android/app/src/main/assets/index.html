<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#06120F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Williw · 本地算力</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <!-- 流动背景 -->
  <div class="flow-bg" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grain"></div>
  </div>

  <main id="app" class="app">

    <!-- ========== 主页：核心算力开关 ========== -->
    <section class="screen active" data-screen="home">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark"></div>
          <div class="brand-text">
            <h1>Williw</h1>
            <p>本地算力 · 即开即用</p>
          </div>
        </div>
        <div class="status-pill" id="model-pill" data-state="offline">
          <span class="dot"></span><span id="model-pill-text">未加载模型</span>
        </div>
      </header>

      <!-- 状态卡：流光圆环 + 核心开关 -->
      <div class="hero">
        <div class="ring-wrap">
          <svg class="ring" viewBox="0 0 220 220" aria-hidden="true">
            <defs>
              <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%"  stop-color="#0FB37A"/>
                <stop offset="55%" stop-color="#22D3A6"/>
                <stop offset="100%" stop-color="#4F46E5"/>
              </linearGradient>
            </defs>
            <circle class="ring-bg" cx="110" cy="110" r="96" />
            <circle class="ring-fg" cx="110" cy="110" r="96" id="ring-fg"
                    stroke="url(#ringGrad)" />
          </svg>
          <button type="button" class="power" id="power-btn" aria-label="开关 API 服务">
            <span class="power-inner" id="power-inner">
              <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 2v8"/>
                <path d="M5.5 7.5a8 8 0 1 0 13 0"/>
              </svg>
            </span>
            <span class="power-label" id="power-label">开启</span>
          </button>
        </div>

        <div class="hero-meta">
          <div class="meta-line"><span>状态</span><b id="state-text">已关闭</b></div>
          <div class="meta-line"><span>地址</span><b id="addr-text" class="mono">—</b></div>
          <div class="meta-line"><span>模型</span><b id="hero-model">—</b></div>
        </div>
      </div>

      <!-- 提示卡 -->
      <div class="card tip">
        <div class="tip-title">工作方式</div>
        <p>开启后，手机变成一台可被局域网设备调用的 AI 算力服务器，扫码即可连接，类似 WiFi 直连。</p>
      </div>
    </section>

    <!-- ========== 模型页 ========== -->
    <section class="screen" data-screen="models">
      <header class="topbar">
        <button type="button" class="icon-btn" data-back="home" aria-label="返回">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="brand-text">
          <h1>本地模型</h1>
          <p>下载后可对外提供算力</p>
        </div>
      </header>

      <div class="scroll-area">
        <div class="card">
          <div class="card-title">当前模型</div>
          <div class="current-model">
            <div class="cm-main">
              <div class="cm-name" id="cur-name">未加载</div>
              <div class="cm-sub" id="cur-sub">开启服务前请先选择模型</div>
            </div>
            <div class="cm-state" id="cur-state">—</div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">推荐模型</div>
          <ul class="model-list" id="model-list">
            <!-- 动态填充 -->
          </ul>
        </div>

        <div class="card">
          <div class="card-title">下载自定义模型</div>
          <div class="field">
            <input id="dl-url" placeholder="模型 GGUF 直链 URL" />
            <div class="hint">支持 Hugging Face 等提供 GGUF 直链的来源</div>
          </div>
          <div class="field">
            <input id="dl-name" placeholder="保存文件名，例如 qwen2.5-0.5b.gguf" />
          </div>
          <button class="btn-ghost" id="btn-dl">开始下载</button>
        </div>
      </div>
    </section>

    <!-- ========== 连接页 ========== -->
    <section class="screen" data-screen="connect">
      <header class="topbar">
        <button type="button" class="icon-btn" data-back="home" aria-label="返回">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="brand-text">
          <h1>连接</h1>
          <p id="connect-sub">服务开启后可被其他设备调用</p>
        </div>
      </header>

      <div class="scroll-area">
        <div class="card qr-card" id="qr-card">
          <div class="qr-box">
            <div class="qr-glow"></div>
            <canvas id="qr" width="220" height="220"></canvas>
          </div>
          <div class="connect-info">
            <div class="ci-row"><span>地址</span><b id="ci-addr" class="mono">—</b></div>
            <div class="ci-row"><span>密钥</span><b id="ci-key" class="mono">—</b></div>
            <div class="ci-row"><span>模型</span><b id="ci-model">—</b></div>
          </div>
          <div class="connect-actions">
            <button class="btn-ghost" id="copy-curl">复制调用示例</button>
            <button class="btn-ghost" id="refresh-qr">刷新</button>
          </div>
        </div>

        <div class="card">
          <div class="card-title">如何调用</div>
          <p class="hint">其它设备扫码后即可调用本机算力。也可以直接访问 API 地址，Bearer 鉴权。</p>
          <pre class="code" id="curl-snippet">开启服务后显示</pre>
        </div>
      </div>
    </section>

    <!-- ========== 底部 Tab ========== -->
    <nav class="tabbar">
      <button class="tab active" data-go="home">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
        <span>主页</span>
      </button>
      <button class="tab" data-go="models">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        <span>模型</span>
      </button>
      <button class="tab" data-go="connect">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12a7 7 0 0 1 14 0"/><path d="M8.5 12a3.5 3.5 0 0 1 7 0"/><circle cx="12" cy="12" r="1.2" fill="currentColor"/></svg>
        <span>连接</span>
      </button>
    </nav>

    <!-- ========== 浮层：进度 ========== -->
    <div class="sheet" id="sheet" hidden>
      <div class="sheet-mask"></div>
      <div class="sheet-body">
        <div class="sheet-title" id="sheet-title">下载中</div>
        <div class="sheet-sub" id="sheet-sub">正在准备…</div>
        <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
        <button class="btn-ghost" id="sheet-cancel">取消</button>
      </div>
    </div>

    <!-- ========== Toast ========== -->
    <div class="toast" id="toast" hidden></div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
